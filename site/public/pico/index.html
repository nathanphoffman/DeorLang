<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pico</title>
    <link rel="icon" href="/reddeer.png" type="image/png">
    <link rel="stylesheet" href="/styles.css">

 <style>
        img.logo {
            image-rendering: pixelated;
        }
    </style>

</head>

<body class="bg-gray-900">
   
    <main class="max-w-[70rem] px-6 text-gray-300 mx-auto text-center text-md">
        <div
            class="grid grid-cols-[auto_1fr] items-start gap-x-4 [grid-template-areas:'deer_title'_'desc_desc'] sm:[grid-template-areas:'deer_title'_'deer_desc'] m-4 mt-6 mb-6 md:m-8 text-left">
            <img src="pico/deorterm.png" alt="Pixel art of a retro terminal with a deer, the D-Pico mascot"
                class="logo w-16 sm:w-24 md:w-28 [grid-area:deer]" />
            <h1 class="text-7xl font-serif [grid-area:title]">D-Pico</h1>
            <p class="text-xl mt-4 sm:mt-0 [grid-area:desc] italic">A terminal editor built in <a href="https://deor.dev" class="underline">Deor</a> and Rust
            </p>
        </div>

        <div>
         <h2 class="mt-11 text-4xl font-serif">Screenshots</h2>
          <img class="max-w-xs" src="pico/screenshot.png">
        </div>

        <h2 class="mt-11 text-4xl font-serif">Get Started Today!</h2>
        <div class="bg-gray-800 mt-2 rounded-3xl shadow-[inset_0_2px_6px_rgba(0,0,0,0.35)]">

            <pre class="bg-gray-800 text-left max-h-0 rounded-b-3xl">
            <code class="language-deor">

            This is a test

            </code>
            </pre>
            </div>
        </div>

      
    
    </main>
</body>

</html>
